services:
  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-analytics}
      MYSQL_DATABASE: learning_analytics
    ports:
      - "3307:3306"
    volumes:
      - mysqldata:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - la-internal
    restart: unless-stopped

  ai:
    build:
      context: .
      dockerfile: services/ai/Dockerfile
    environment:
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD:-analytics}@mysql:3306/learning_analytics
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-}
      MODEL_DIR: /app/artifacts
    ports:
      - "8001:8000"
    volumes:
      - ai-artifacts:/app/artifacts
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - la-internal
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD:-analytics}@mysql:3306/learning_analytics
      JWT_SECRET: ${JWT_SECRET:-dev-change-me-use-openssl-rand}
      JWT_EXPIRES_DAYS: ${JWT_EXPIRES_DAYS:-7}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      AI_SERVICE_URL: http://ai:8000
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-}
    ports:
      - "3002:3001"
    depends_on:
      mysql:
        condition: service_healthy
      ai:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3001/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - la-internal
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001/api}
        NEXT_PUBLIC_USE_MOCK: "false"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001/api}
      NEXT_PUBLIC_USE_MOCK: "false"
      API_INTERNAL_URL: ${API_INTERNAL_URL:-http://api:3001/api}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - la-internal
    restart: unless-stopped

volumes:
  mysqldata:
  ai-artifacts:

networks:
  la-internal:
    driver: bridge
