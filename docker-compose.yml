# Local / single-VM stack: Postgres + API + Web + AI
# Production: use strong passwords, INTERNAL_API_KEY, JWT_SECRET; prefer secrets not inline env.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: analytics
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-analytics}
      POSTGRES_DB: learning_analytics
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analytics -d learning_analytics"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - la-internal

  ai:
    build:
      context: .
      dockerfile: services/ai/Dockerfile
    environment:
      DATABASE_URL: postgresql://analytics:${POSTGRES_PASSWORD:-analytics}@postgres:5432/learning_analytics
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-}
      MODEL_DIR: /app/artifacts
    ports:
      - "8000:8000"
    volumes:
      - ai-artifacts:/app/artifacts
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - la-internal
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://analytics:${POSTGRES_PASSWORD:-analytics}@postgres:5432/learning_analytics
      JWT_SECRET: ${JWT_SECRET:-dev-change-me-use-openssl-rand}
      JWT_EXPIRES_DAYS: ${JWT_EXPIRES_DAYS:-7}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      AI_SERVICE_URL: http://ai:8000
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      ai:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3001/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - la-internal
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001/api}
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001/api}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - la-internal
    restart: unless-stopped

volumes:
  pgdata:
  ai-artifacts:

networks:
  la-internal:
    driver: bridge
